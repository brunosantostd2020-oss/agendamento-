<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0d9488"/>
  <title>Entrar — AgendaOK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#0d9488;--teal-esc:#0a7c72;--teal-lt:#ccfbf1;--dark:#0f172a;--text:#334155;--muted:#64748b;--borda:#e2e8f0;--bg:#f8faff;--branco:#fff;--vermelho:#dc2626;--safe-bottom:env(safe-area-inset-bottom,0px)}
    html{-webkit-tap-highlight-color:transparent}
    body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100dvh;display:flex;flex-direction:column}

    .header{background:var(--branco);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--borda)}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-box{width:36px;height:36px;border-radius:10px;background:var(--teal);color:white;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px}
    .logo-txt{font-weight:800;font-size:17px;color:var(--dark)}

    .hero{background:linear-gradient(135deg,var(--teal),var(--teal-esc));padding:40px 20px;text-align:center;color:white}
    .hero-ico{font-size:56px;margin-bottom:16px}
    .hero h1{font-size:24px;font-weight:800;margin-bottom:6px}
    .hero p{font-size:14px;opacity:0.9}

    .form-wrap{flex:1;padding:28px 20px;padding-bottom:calc(28px + var(--safe-bottom));display:flex;flex-direction:column;gap:0;max-width:480px;width:100%;margin:0 auto}

    .campo{margin-bottom:18px}
    .campo label{display:block;font-size:14px;font-weight:700;color:var(--dark);margin-bottom:8px}
    .campo input{
      width:100%;border:2px solid var(--borda);border-radius:14px;
      font-family:'Inter',sans-serif;font-size:17px;padding:16px 18px;
      color:var(--dark);background:var(--branco);outline:none;transition:all 0.2s;
      -webkit-appearance:none;
    }
    .campo input:focus{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-lt)}

    .erro{color:var(--vermelho);font-size:14px;font-weight:700;padding:12px 16px;background:#fef2f2;border:2px solid #fecaca;border-radius:12px;margin-bottom:16px;display:none;text-align:center}
    .erro.show{display:block}

    .btn-entrar{
      width:100%;padding:18px;border-radius:14px;
      background:var(--teal);color:white;
      font-family:'Inter',sans-serif;font-size:17px;font-weight:800;
      border:none;cursor:pointer;transition:all 0.2s;
      -webkit-tap-highlight-color:transparent;
      margin-top:4px;
    }
    .btn-entrar:active{transform:scale(0.97);background:var(--teal-esc)}
    .btn-entrar:disabled{opacity:0.6}

    .link-cad{text-align:center;margin-top:24px;font-size:15px;color:var(--muted)}
    .link-cad a{color:var(--teal);font-weight:800;text-decoration:none}

    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:13px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--borda)}
  </style>
</head>
<body>
<div class="header">
  <a class="logo" href="/"><div class="logo-box">OK</div><span class="logo-txt">AGENDA OK</span></a>
</div>

<div class="hero">
  <div class="hero-ico">👋</div>
  <h1>Bem-vindo de volta!</h1>
  <p>Entre na sua conta para gerenciar seus agendamentos</p>
</div>

<div class="form-wrap">
  <div class="erro" id="erro"></div>
  <div class="campo">
    <label>✉️ E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" inputmode="email" onkeydown="if(event.key==='Enter')document.getElementById('senha').focus()"/>
  </div>
  <div class="campo">
    <label>🔒 Senha</label>
    <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()"/>
  </div>
  <div class="erro" id="erro2"></div>
  <button class="btn-entrar" id="btn" onclick="entrar()">Entrar na minha conta</button>
  <div class="divider">ou</div>
  <div class="link-cad">Não tem conta? <a href="/cadastro">Criar conta grátis →</a></div>
</div>

<script>
async function entrar(){
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const erro=document.getElementById('erro');
  const btn=document.getElementById('btn');
  erro.classList.remove('show');
  if(!email||!senha){erro.textContent='Preencha e-mail e senha';erro.classList.add('show');return;}
  btn.disabled=true;btn.textContent='Entrando...';
  try{
    const r=await fetch('/auth/login',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,senha})});
    const d=await r.json();
    if(!r.ok){erro.textContent=d.erro||'Erro ao entrar';erro.classList.add('show');btn.disabled=false;btn.textContent='Entrar na minha conta';return;}
    window.location.replace('/painel');
  }catch(e){erro.textContent='Erro de conexão. Tente novamente.';erro.classList.add('show');btn.disabled=false;btn.textContent='Entrar na minha conta';}
}
</script>
</body>
</html>
